# =============================================================================
# AccountSafe - Oracle Cloud Nginx Config (API-only)
# =============================================================================
# This config is loaded via nginx's envsubst template mechanism. The nginx
# container substitutes ${DOMAIN} at startup so the same file is reusable.
#
# Responsibilities:
#   - HTTP -> HTTPS redirect
#   - Let's Encrypt ACME webroot challenge
#   - Terminate TLS for https://${DOMAIN}
#   - Reverse-proxy /api/, /admin/, /static/, /media/ to Django/Gunicorn
#   - Enforce per-IP rate limits (tighter on auth endpoints)
#
# It does NOT serve a React SPA -- the frontend is hosted on Vercel.
# =============================================================================

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

upstream backend {
    server backend:8000;
    keepalive 32;
}

# -----------------------------------------------------------------------------
# HTTP :80 - ACME challenge + permanent redirect to HTTPS
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS :443 - API, admin, static, media
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${DOMAIN};

    client_max_body_size 20M;

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers (CSP is deliberately NOT set here -- the React app on
    # Vercel owns its own CSP; this server serves JSON + admin).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types application/json application/javascript text/css text/plain text/xml image/svg+xml font/woff font/woff2;

    # Strict auth/ZK rate limit (matched BEFORE the broad /api/ block)
    location ~ ^/api/(auth|zk|password-reset|token)/ {
        limit_req zone=login_limit burst=5 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    # General API
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Django admin (accessible at https://${DOMAIN}/admin/)
    location /admin/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Django static (admin + DRF browsable API assets)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # User uploads
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health check (plain, no proxying -- for uptime monitors)
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Root: no SPA here. Return JSON so callers see a clear message instead
    # of a default nginx page.
    location = / {
        add_header Content-Type application/json;
        return 200 '{"service":"accountsafe-api","status":"ok","docs":"/api/"}';
    }

    # Block dotfiles and leaky paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~ /(\.env|\.git|docker-compose) {
        deny all;
        return 404;
    }
}
